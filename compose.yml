version: "3"

volumes:
  es-data:
    driver: local
  blast-data:
    driver: local
  mysql-data:
    driver: local

services:

  nginx:
    image: nginx:1.19
    restart: always
    ports:
      - ${HTTP_PORT:-80}:80
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ${PUBLIC_DATA_DIR}:/download/:ro

  fe:
    image: docker.gitlab.gwdg.de/ibb/ibb-fe:2.0.0-dev
    # As for now on 21.05.2024, setting NUXT_OIDC_PROVIDERS_KEYCLOAK_BASE_URL does not work with "nuxt-oidc-auth" module yet
    # https://github.com/itpropro/nuxt-oidc-auth/issues/20#issuecomment-2067548689
    # Therefore, we replace it with the correct value on container startup
    command: ["sh", "-c", "sed -i 's|https://ibeetle-base.uni-goettingen.de/ibb/keycloak/realms/ibb|'$${NUXT_OIDC_PROVIDERS_KEYCLOAK_BASE_URL}'|g' /src/.output/server/chunks/runtime.mjs; node .output/server/index.mjs"]
    restart: always
    extra_hosts:
      # If requests sent to PUBLIC_SERVER from this container do not work because PUBLIC_SERVER is resolved to 127.0.0.1 or 127.0.1.1,
      # the following line is needed.
      - ${HOSTNAME}:host-gateway
    environment:
      - NUXT_PUBLIC_APIS_BASE_URL=${PUBLIC_SERVER}/ibb/api
      - NUXT_PUBLIC_UI_PAGES_BLAST=${PUBLIC_SERVER}/ibb/blast/
      - NUXT_PUBLIC_UI_PAGES_API_DOC=${PUBLIC_SERVER}/ibb/swagger-ui/
      - NUXT_PUBLIC_MAIN_SPECIES=${MAIN_SPECIES}
      - NUXT_OIDC_SESSION_SECRET
      - NUXT_OIDC_TOKEN_KEY
      - NUXT_OIDC_AUTH_SESSION_SECRET
      - NUXT_OIDC_PROVIDERS_KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET}
      - NUXT_OIDC_PROVIDERS_KEYCLOAK_REDIRECT_URI=${PUBLIC_SERVER}/auth/keycloak/callback
      - NUXT_OIDC_PROVIDERS_KEYCLOAK_BASE_URL=${PUBLIC_SERVER}/ibb/keycloak/realms/ibb


  jbrowse2:
    image: docker.gitlab.gwdg.de/ibb/api/ibb-jbrowse2:1.5.0
    restart: always

  ontoscope:
    image: docker.gitlab.gwdg.de/ibb/api/ibb-ontoscope:latest
    restart: always

  swagger-ui:
    image: swaggerapi/swagger-ui
    restart: always
    environment:
      - BASE_URL=/ibb/swagger-ui
      - "URLS=[
        { url: '$PUBLIC_SERVER/ibb/api/geneservice/v1/q/openapi/', name: 'Gene Service' },
        { url: '$PUBLIC_SERVER/ibb/api/ontologyservice/v1/q/openapi/', name: 'Ontology Service' }
        ]" 

  es:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.1
    restart: always
    volumes:
      - es-data:/usr/share/elasticsearch/data
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    mem_limit: 1g
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - 9200:9200
    healthcheck:
      test: 
        [
          "CMD-SHELL",
          "curl -s localhost:9200 | grep -q 'You Know, for Search'"
        ]
      interval: 10s
      timeout: 10s
      retries: 120

  geneservice:
    image: docker.gitlab.gwdg.de/ibb/api/geneservice:2.0.0-dev
    restart: always
    depends_on:
      es:
        condition: service_healthy
    volumes:
      - ${PUBLIC_DATA_DIR}:/data:ro
    environment:
      - GENESERVICE_MAIN_SPECIES=${MAIN_SPECIES}
      - MP_OPENAPI_SERVERS=$PUBLIC_SERVER/ibb/api/geneservice/v1/

  ontologyservice:
    image: docker.gitlab.gwdg.de/ibb/api/ontologyservice:1.5.0
    restart: always
    depends_on:
      es:
        condition: service_healthy
    environment:
      - MP_OPENAPI_SERVERS=$PUBLIC_SERVER/ibb/api/ontologyservice/v1/

  imageservice:
    image: docker.gitlab.gwdg.de/ibb/api/imageservice:2.0.0
    restart: always
    user: "${UID}:${GID}"
    environment:
      - QUARKUS_OIDC_CREDENTIALS_SECRET=$KEYCLOAK_CLIENT_SECRET
    depends_on:
      es:
        condition: service_healthy
    volumes:
      - ${IMAGE_DIR}:/images
      - ${PRIVATE_DATA_DIR}/imageservice:/data:ro
         
  phenotypeservice:
    image: docker.gitlab.gwdg.de/ibb/api/phenotypeservice:1.6.0
    restart: always
    depends_on:
      es:
        condition: service_healthy
      imageservice:
        condition: service_started
    environment:
      - QUARKUS_OIDC_CREDENTIALS_SECRET=$KEYCLOAK_CLIENT_SECRET
      - QUARKUS_OIDC_AUTH_SERVER_URL=http://keycloak:8080/ibb/keycloak/realms/ibb
    volumes:
      - ${IMAGE_DIR}:/images
      - ${PRIVATE_DATA_DIR}/phenotypeservice:/data:ro

  goannotationservice:
    image: docker.gitlab.gwdg.de/ibb/api/geneontologyservice:1.6.0
    restart: always
    environment:
      - QUARKUS_OIDC_CREDENTIALS_SECRET=$KEYCLOAK_CLIENT_SECRET
      - QUARKUS_OIDC_AUTH_SERVER_URL=http://keycloak:8080/ibb/keycloak/realms/ibb
    depends_on:
      es:
        condition: service_healthy

  publicationservice:
    image: docker.gitlab.gwdg.de/ibb/api/ibb-publication:1.6.0
    restart: always
    environment:
      - QUARKUS_OIDC_CREDENTIALS_SECRET=$KEYCLOAK_CLIENT_SECRET
      - QUARKUS_OIDC_AUTH_SERVER_URL=http://keycloak:8080/ibb/keycloak/realms/ibb
    depends_on:
      es:
        condition: service_healthy

  querypipelineservice:
    image: docker.gitlab.gwdg.de/ibb/api/query-pipeline:1.5.0
    restart: always
    environment:
      - PUBLIC_SERVER=$PUBLIC_SERVER/ibb/api/querypipelineservice/v1/

  mysql:
    image: mysql:8.0
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD
      - MYSQL_DATABASE=keycloak
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysql -u root -p$$MYSQL_ROOT_PASSWORD -e 'select 1'"
        ]
      interval: 10s
      timeout: 10s
      retries: 120

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.3
    restart: always
    command: ["start"]
    environment:
      - KEYCLOAK_ADMIN
      - KEYCLOAK_ADMIN_PASSWORD
      - KC_HOSTNAME_URL=${PUBLIC_SERVER}/ibb/keycloak/
      - KC_HOSTNAME_ADMIN_URL=${PUBLIC_SERVER}/ibb/keycloak/
      - KC_HOSTNAME_STRICT=false
      - KC_HOSTNAME_STRICT_HTTPS=false
      - KC_HTTP_RELATIVE_PATH=/ibb/keycloak/
      - KC_HTTP_ENABLED=true
      - KC_PROXY_HEADERS=xforwarded
      - KC_DB=mysql
      - KC_DB_URL_HOST=mysql
      - KC_DB_USERNAME=root
      - KC_DB_PASSWORD=$MYSQL_ROOT_PASSWORD
      - KC_DB_SCHEMA=keycloak
    depends_on:
      mysql:
        condition: service_healthy

  blast:
    # The current version is 3.0.1 but they have not provided the docker image with this tag.
    image: wurmlab/sequenceserver:latest
    tty: true
    mem_limit: 1g
    restart: always
    # Fix the redirection link after a job is submitted in BLAST page.
    command: ["sh", "-c", "sed -i 's|redirect to(\"/#{job.id}\")|redirect to(\"'$${PUBLIC_SERVER}'/ibb/blast/#{job.id}\")|g' /sequenceserver/lib/sequenceserver/routes.rb; sequenceserver"]
    environment:
      - PUBLIC_SERVER
    volumes:
      - blast-data:/db/

  setup-blast:
    image: wurmlab/sequenceserver:latest
    command: ["/bin/sh", "/work/create-db.sh", "${MAIN_SPECIES_DISPLAY}"]
    environment:
      - MAIN_SPECIES_DISPLAY
    volumes:
      - ${PUBLIC_DATA_DIR}/genomic/${MAIN_SPECIES}/:/data/
      - ./blast/:/work/
      - blast-data:/db/

    profiles:
      - setup
      - update

  update-geneservice:
    image: docker.gitlab.gwdg.de/ibb/api/geneservice:2.0.0-dev
    depends_on:
      es:
        condition: service_healthy
    volumes:
      - ${PUBLIC_DATA_DIR}:/data:ro
    environment:
      - geneservice.elasticsearch.delete-on-start.genomiclocations=true
      - geneservice.elasticsearch.delete-on-start.sequences=true
      - geneservice.elasticsearch.delete-on-start.synonyms=true
      - geneservice.elasticsearch.delete-on-start.orthology=true
    profiles:
      - update
