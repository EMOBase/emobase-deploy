events {
}

http {
  server {

    # This is the internal docker dns server, cache for 30 seconds
    resolver 127.0.0.11 valid=30s;

    location / {
      # Using the variable trick, nginx will now start even if the upstream host is not yet reachable.
      # Inside docker, need the resolver to work.
      set $upstream http://fe:8080;
      proxy_pass $upstream;

      # Needed for keycloak authentication, don't know why
      proxy_set_header Host $http_host;
    }
    location /download/ {
      alias /download/;
      autoindex on;
      add_header Access-Control-Allow-Origin *;
    }
    # # Uncomment to allow access to elasticsearch from outside, useful for data backup or restore.
    # # Very insecure so turn off when not needed
    # location /ibb/es {
    #   set $upstream es;
    #   proxy_pass http://$upstream:9200;
    #   rewrite ^/ibb/es/(.*)$ /$1 break;
    # }
    location /ibb/keycloak/ {
      set $upstream keycloak;
      proxy_pass http://$upstream:8080;
    }

    location /ibb/directus/ {
      set $upstream http://directus:8055;
      proxy_pass $upstream;
      rewrite ^/ibb/directus/(.*)$ /$1 break;
    }

    location /ibb/jbrowse2/ {
      alias /ibb/jbrowse2/;
      add_header Access-Control-Allow-Origin *;
      include /etc/nginx/mime.types;
    }

    location /ibb/blast/ {
      proxy_pass http://blast:4567/; # Can't use the variable trick here, the webpage does not render properly, don't know why
      proxy_set_header X-Script-Name /ibb/blast;
      proxy_intercept_errors on;
      proxy_connect_timeout 8;
      proxy_read_timeout 180;
    }
    location /ibb/ontoscope {
      set $upstream ontoscope;
      proxy_pass http://$upstream:80;
    }
    location /ibb/swagger-ui {
      set $upstream swagger-ui;
      proxy_pass http://$upstream:8080;
    }
    location /ibb/api/ontologyservice {
      set $upstream http://ontologyservice:8080;
      proxy_pass $upstream;
      rewrite ^/ibb/api/ontologyservice/v1/(.*)$ /$1 break;
    }
    location /ibb/api/imageservice {
      set $upstream http://imageservice:8080;
      proxy_pass $upstream;
      rewrite ^/ibb/api/imageservice/v1/(.*)$ /$1 break;
    }
    location /ibb/api/phenotypeservice {
      set $upstream http://phenotypeservice:8080;
      proxy_pass $upstream;
      rewrite ^/ibb/api/phenotypeservice/v1/(.*)$ /$1 break;
    }
    location /ibb/api/goannotationservice {
      set $upstream http://goannotationservice:8080;
      proxy_pass $upstream;
      rewrite ^/ibb/api/goannotationservice/v1/(.*)$ /$1 break;
    }
    location /ibb/api/publicationservice {
      set $upstream http://publicationservice:8080;
      proxy_pass $upstream;
      rewrite ^/ibb/api/publicationservice/v1/(.*)$ /$1 break;
    }
    location /ibb/api/geneservice {
      set $upstream http://geneservice:8080;
      proxy_pass $upstream;
      rewrite ^/ibb/api/geneservice/v1/(.*)$ /$1 break;
    }
    location /ibb/api/querypipelineservice {
      set $upstream http://querypipelineservice:8080;
      proxy_pass $upstream;
      rewrite ^/ibb/api/querypipelineservice/v1/(.*)$ /$1 break;
    }
    location /ibb/api/emobasegenomicsservice {
      set $upstream http://emobasegenomicsservice:8080;
      proxy_pass $upstream;
      rewrite ^/ibb/api/emobasegenomicsservice/(.*)$ /$1 break;
    }
    location /ibb/api/emobasegenomicsservice/uploads {
      set $upstream http://emobasegenomicsservice:8080;
      proxy_pass $upstream;
      rewrite ^/ibb/api/emobasegenomicsservice/(.*)$ /$1 break;

      # TUS protocol: rewrite the internal Location header from the service's own URL to the public URL,
      # so the client sends upload chunks back through nginx instead of directly to the container.
      # $http_host (not $host) is used to preserve the port (e.g. localhost:9090) from the client's Host header.
      proxy_redirect http://emobasegenomicsservice:8080/uploads/ $scheme://$http_host/ibb/api/emobasegenomicsservice/uploads/;

      # Configure TUS protocol behind a reverse proxy,
      # see https://tus.github.io/tusd/getting-started/configuration/#proxies
      # TUS: Adjust maximum request size
      client_max_body_size 30m;

      # TUS: Disable request buffering
      proxy_request_buffering off;
      proxy_buffering off;

      # TUS: Forward hostname and scheme
      proxy_set_header X-Forwarded-Host $host:$server_port;
      proxy_set_header X-Forwarded-Proto $scheme;

      # Important for PATCH requests: keep the connection alive
      proxy_http_version 1.1;
    }
  }
}
