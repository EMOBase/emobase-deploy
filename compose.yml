volumes:
  es-data:
    driver: local
  mysql-data:
    driver: local
  blast-data:
    driver: local
  jbrowse2-data:
    driver: local
  directus-data:
    driver: local

services:

  nginx:
    image: nginx:1.19
    restart: always
    ports:
      - ${HTTP_PORT:-80}:80
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ${PUBLIC_DATA_DIR}:/download/:ro
      - jbrowse2-data:/ibb/jbrowse2/:ro

  fe:
    image: ghcr.io/emobase/emobase-web:latest
    restart: always
    environment:
      - PUBLIC_MAIN_SPECIES=${MAIN_SPECIES}
      - PUBLIC_APIS_BASE_URL=${PUBLIC_SERVER}/ibb/api
      - PUBLIC_UI_PAGE_GENOMEBROWSER=${PUBLIC_SERVER}/ibb/jbrowse2/
      - PUBLIC_UI_PAGE_BLAST=${PUBLIC_SERVER}/ibb/blast/
      - PUBLIC_DIRECTUS_URL=${PUBLIC_SERVER}/ibb/directus/
      - AUTH_SECRET=${SSR_OIDC_SESSION_SECRET}
      - AUTH_TRUST_HOST=true
      - KEYCLOAK_ISSUER=${PUBLIC_SERVER}/ibb/keycloak/realms/ibb
      - KEYCLOAK_CLIENT_ID=ibb-client
      - KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET}


  swagger-ui:
    image: swaggerapi/swagger-ui
    restart: always
    environment:
      - BASE_URL=/ibb/swagger-ui
      - "URLS=[
        { url: '$PUBLIC_SERVER/ibb/api/geneservice/v1/q/openapi/', name: 'Gene Service' },
        { url: '$PUBLIC_SERVER/ibb/api/ontologyservice/v1/q/openapi/', name: 'Ontology Service' }
        ]" 

  es:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.1
    restart: always
    volumes:
      - es-data:/usr/share/elasticsearch/data
      - ./es_bk:/es-bk
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - path.repo=/es-bk
    mem_limit: 512m
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - 9202:9200
    healthcheck:
      test: 
        [
          "CMD-SHELL",
          "curl -s localhost:9200 | grep -q 'You Know, for Search'"
        ]
      interval: 10s
      timeout: 10s
      retries: 18

  geneservice:
    image: docker.gitlab.gwdg.de/medbioinf/devbio/ibb/geneservice:2.0.0-dev
    restart: always
    depends_on:
      es:
        condition: service_healthy
    volumes:
      - ${PUBLIC_DATA_DIR}:/data:ro
    environment:
      - GENESERVICE_MAIN_SPECIES=${MAIN_SPECIES}
      - MP_OPENAPI_SERVERS=$PUBLIC_SERVER/ibb/api/geneservice/v1/

  ontologyservice:
    image: docker.gitlab.gwdg.de/medbioinf/devbio/ibb/ontologyservice:1.5.0
    restart: always
    depends_on:
      es:
        condition: service_healthy
    environment:
      - MP_OPENAPI_SERVERS=$PUBLIC_SERVER/ibb/api/ontologyservice/v1/

  imageservice:
    image: docker.gitlab.gwdg.de/medbioinf/devbio/ibb/imageservice:2.0.0
    restart: always
    user: "${UID}:${GID}"
    environment:
      - QUARKUS_OIDC_CREDENTIALS_SECRET=$KEYCLOAK_CLIENT_SECRET
    depends_on:
      es:
        condition: service_healthy
    volumes:
      - ${IMAGE_DIR}:/images
      - ${PRIVATE_DATA_DIR}/imageservice:/data:ro
         
  phenotypeservice:
    image: docker.gitlab.gwdg.de/medbioinf/devbio/ibb/phenotypeservice:1.6.0
    restart: always
    depends_on:
      es:
        condition: service_healthy
      imageservice:
        condition: service_started
    environment:
      - QUARKUS_OIDC_CREDENTIALS_SECRET=$KEYCLOAK_CLIENT_SECRET
      - QUARKUS_OIDC_AUTH_SERVER_URL=http://keycloak:8080/ibb/keycloak/realms/ibb
    volumes:
      - ${IMAGE_DIR}:/images
      - ${PRIVATE_DATA_DIR}/phenotypeservice:/data:ro

  goannotationservice:
    image: docker.gitlab.gwdg.de/medbioinf/devbio/ibb/goannotationservice:1.6.0
    restart: always
    environment:
      - QUARKUS_OIDC_CREDENTIALS_SECRET=$KEYCLOAK_CLIENT_SECRET
      - QUARKUS_OIDC_AUTH_SERVER_URL=http://keycloak:8080/ibb/keycloak/realms/ibb
    depends_on:
      es:
        condition: service_healthy

  publicationservice:
    image: docker.gitlab.gwdg.de/medbioinf/devbio/ibb/publicationservice:1.6.0
    restart: always
    environment:
      - QUARKUS_OIDC_CREDENTIALS_SECRET=$KEYCLOAK_CLIENT_SECRET
      - QUARKUS_OIDC_AUTH_SERVER_URL=http://keycloak:8080/ibb/keycloak/realms/ibb
    depends_on:
      es:
        condition: service_healthy

  querypipelineservice:
    image: docker.gitlab.gwdg.de/medbioinf/devbio/ibb/querypipelineservice:1.5.0
    restart: always
    environment:
      - PUBLIC_SERVER=$PUBLIC_SERVER/ibb/api/querypipelineservice/v1/

  mysql:
    image: mysql:8.0
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD
    ports:
      - 3308:3306
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -u root -p$$MYSQL_ROOT_PASSWORD --silent"
        ]
      interval: 10s
      timeout: 10s
      retries: 18

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.3
    restart: always
    command: ["start", "--import-realm", "--health-enabled=true"]
    volumes:
      - ./keycloak/ibb-realm.json:/opt/keycloak/data/import/ibb-realm.json:ro
    environment:
      - KEYCLOAK_ADMIN
      - KEYCLOAK_ADMIN_PASSWORD
      - KC_HOSTNAME_URL=${PUBLIC_SERVER}/ibb/keycloak/
      - KC_HOSTNAME_ADMIN_URL=${PUBLIC_SERVER}/ibb/keycloak/
      - KC_HOSTNAME_STRICT=false
      - KC_HOSTNAME_STRICT_HTTPS=false
      - KC_HTTP_RELATIVE_PATH=/ibb/keycloak/
      - KC_HTTP_ENABLED=true
      - KC_PROXY_HEADERS=xforwarded
      - KC_DB=mysql
      - KC_DB_URL_HOST=mysql
      - KC_DB_USERNAME=root
      - KC_DB_PASSWORD=$MYSQL_ROOT_PASSWORD
      - KC_DB_SCHEMA=keycloak

      - KEYCLOAK_CLIENT_SECRET
      - PUBLIC_SERVER
      - COCO_USERNAME
      - COCO_PASSWORD
      - JAVA_OPTS=-Xms256m -Xmx768m
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "{ printf 'HEAD /ibb/keycloak/health/ready HTTP/1.0\r\n\r\n' >&0; grep -q 'HTTP/1.0 200'; } 0<>/dev/tcp/localhost/8080"
        ]
      interval: 10s
      timeout: 10s
      retries: 18

  directus:
    restart: always
    image: directus/directus:11
    environment:
      - SECRET=${DIRECTUS_SECRET}

      - DB_CLIENT=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=directus
      - DB_USER=root
      - DB_PASSWORD=${MYSQL_ROOT_PASSWORD}

      - ADMIN_EMAIL=${DIRECTUS_ADMIN_EMAIL}
      - ADMIN_PASSWORD=${DIRECTUS_ADMIN_PASSWORD}
      - PROJECT_OWNER=${DIRECTUS_ADMIN_EMAIL}

      - PUBLIC_URL=${PUBLIC_SERVER}/ibb/directus

      - AUTH_PROVIDERS=keycloak
      - AUTH_KEYCLOAK_DRIVER=openid
      - AUTH_KEYCLOAK_CLIENT_ID=ibb-client
      - AUTH_KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET}
      - AUTH_KEYCLOAK_ISSUER_URL=http://keycloak:8080/ibb/keycloak/realms/ibb 
      - AUTH_KEYCLOAK_IDENTIFIER_KEY=preferred_username
      - AUTH_KEYCLOAK_ALLOW_PUBLIC_REGISTRATION=true
      - AUTH_KEYCLOAK_REDIRECT_ALLOW_LIST=${PUBLIC_SERVER}/ibb/directus
      - AUTH_KEYCLOAK_DEFAULT_ROLE_ID=64f31dc8-7465-4416-b1eb-ef6efd990de9
      - TELEMETRY=false
    volumes:
      - directus-data:/directus/uploads
    depends_on:
      mysql:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD-SHELL"
        - "wget -qO- http://127.0.0.1:8055/server/health | grep -q 'ok'"
      interval: 10s
      timeout: 10s
      retries: 18

  blast:
    # The current version is 3.0.1 but they have not provided the docker image with this tag.
    image: wurmlab/sequenceserver:latest
    tty: true
    mem_limit: 1g
    restart: always
    # Fix the redirection link after a job is submitted in BLAST page.
    command: ["sh", "-c", "sed -i 's|redirect to(\"/#{job.id}\")|redirect to(\"'$${PUBLIC_SERVER}'/ibb/blast/#{job.id}\")|g' /sequenceserver/lib/sequenceserver/routes.rb; sequenceserver"]
    environment:
      - PUBLIC_SERVER
    volumes:
      - blast-data:/db/

  setup-directus:
    extends:
      service: directus
    network_mode: "service:directus"
    restart: no
    command: >
      sh -c "pnpm add @directus/sdk &&
        npx directus schema apply /directus/schema.yaml --yes &&
        node /directus/scripts/bootstrap.js"
    volumes:
      - ./directus/scripts:/directus/scripts
      - ./directus/schema.yaml:/directus/schema.yaml
    environment:
      - COREPACK_ENABLE_DOWNLOAD_PROMPT=0
    depends_on:
      directus:
        condition: service_healthy
    profiles:
      - setup

  setup-blast:
    image: wurmlab/sequenceserver:latest
    command: ["/bin/sh", "/work/create-db.sh", "${ASSEMBLY_NAME}"]
    environment:
      - ASSEMBLY_NAME
    volumes:
      - ${PUBLIC_DATA_DIR}/genomic/${MAIN_SPECIES}/:/data/
      - ./blast/:/work/
      - blast-data:/db/

    profiles:
      - setup
      - update

  setup-jbrowse2:
    image: docker.gitlab.gwdg.de/medbioinf/devbio/ibb/ibb-jbrowse2:2.0.0
    command: ["/bin/sh", "/work/setup.sh"]
    volumes:
      - jbrowse2-data:/web/
      - ${PUBLIC_DATA_DIR}/genomic/${MAIN_SPECIES}/:/data/
      - ./jbrowse2/:/work/
    profiles:
      - setup
      - update

  update-geneservice:
    image: docker.gitlab.gwdg.de/medbioinf/devbio/ibb/geneservice:2.0.0-dev
    depends_on:
      es:
        condition: service_healthy
    volumes:
      - ${PUBLIC_DATA_DIR}:/data:ro
    environment:
      - geneservice.elasticsearch.delete-on-start.genomiclocations=true
      - geneservice.elasticsearch.delete-on-start.sequences=true
      - geneservice.elasticsearch.delete-on-start.synonyms=true
      - geneservice.elasticsearch.delete-on-start.orthology=true
    profiles:
      - update

  emobasegenomicsservice:
    image: ghcr.io/emobase/emobase-genomics:latest
    container_name: emobasegenomicsservice
    restart: unless-stopped
    command: ["api", "-c", "/app/config.yaml"]
    environment:
      - EMOBASE_GENOMICS_ENV_PREFIX=emobase_genomics
      - EMOBASE_GENOMICS_MAIN_SPECIES=${MAIN_SPECIES}
      - EMOBASE_GENOMICS_MYSQL__HOST=mysql
      - EMOBASE_GENOMICS_MYSQL__USER=root
      - EMOBASE_GENOMICS_MYSQL__PASSWORD=${MYSQL_ROOT_PASSWORD}
      - EMOBASE_GENOMICS_KEYCLOAK__URL=http://keycloak:8080/ibb/keycloak
      - EMOBASE_GENOMICS_KEYCLOAK__REALM=ibb
      - EMOBASE_GENOMICS_KEYCLOAK__ISSUER=${PUBLIC_SERVER}/ibb/keycloak/realms/ibb
      - EMOBASE_GENOMICS_KEYCLOAK__REQUIRED_ROLE=default-roles-ibb
      - EMOBASE_GENOMICS_ELASTICSEARCH__ADDRESSES=http://es:9200
      - EMOBASE_GENOMICS_ELASTICSEARCH__INDEX_PREFIX=emobasegenomics
      - EMOBASE_GENOMICS_BLAST__DISPLAY_NAME=OGS3
      - EMOBASE_GENOMICS_BLAST__CONTAINER_NAME=blast-1
    volumes:
      - ${PUBLIC_DATA_DIR}/emobase-genomics:/app/public/uploads
      - jbrowse2-data:/web/
      - blast-data:/db/
    depends_on:
      mysql:
        condition: service_healthy
      es:
        condition: service_healthy

  emobasegenomicsworker-1:
    image: ghcr.io/emobase/emobase-genomics:latest
    container_name: emobasegenomicsworker-1
    restart: unless-stopped
    command: ["worker", "-c", "/app/config.yaml"]
    environment:
      - EMOBASE_GENOMICS_ENV_PREFIX=emobase_genomics
      - EMOBASE_GENOMICS_MAIN_SPECIES=${MAIN_SPECIES}
      - EMOBASE_GENOMICS_MYSQL__HOST=mysql
      - EMOBASE_GENOMICS_MYSQL__USER=root
      - EMOBASE_GENOMICS_MYSQL__PASSWORD=${MYSQL_ROOT_PASSWORD}
      - EMOBASE_GENOMICS_ELASTICSEARCH__ADDRESSES=http://es:9200
      - EMOBASE_GENOMICS_ELASTICSEARCH__INDEX_PREFIX=emobasegenomics
      - EMOBASE_GENOMICS_BLAST__DISPLAY_NAME=OGS3
      - EMOBASE_GENOMICS_BLAST__CONTAINER_NAME=blast-1
    volumes:
      - ${PUBLIC_DATA_DIR}/emobase-genomics:/app/public/uploads
      - jbrowse2-data:/web/
      - blast-data:/db/
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      mysql:
        condition: service_healthy
      es:
        condition: service_healthy

  emobasegenomicsworker-2:
    image: ghcr.io/emobase/emobase-genomics:latest
    container_name: emobasegenomicsworker-2
    restart: unless-stopped
    command: ["worker", "-c", "/app/config.yaml"]
    environment:
      - EMOBASE_GENOMICS_ENV_PREFIX=emobase_genomics
      - EMOBASE_GENOMICS_MAIN_SPECIES=${MAIN_SPECIES}
      - EMOBASE_GENOMICS_MYSQL__HOST=mysql
      - EMOBASE_GENOMICS_MYSQL__USER=root
      - EMOBASE_GENOMICS_MYSQL__PASSWORD=${MYSQL_ROOT_PASSWORD}
      - EMOBASE_GENOMICS_ELASTICSEARCH__ADDRESSES=http://es:9200
      - EMOBASE_GENOMICS_ELASTICSEARCH__INDEX_PREFIX=emobasegenomics
      - EMOBASE_GENOMICS_BLAST__DISPLAY_NAME=OGS3
      - EMOBASE_GENOMICS_BLAST__CONTAINER_NAME=blast-1
    volumes:
      - ${PUBLIC_DATA_DIR}/emobase-genomics:/app/public/uploads
      - jbrowse2-data:/web/
      - blast-data:/db/
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      mysql:
        condition: service_healthy
      es:
        condition: service_healthy

  emobasegenomicsdbmigrate:
    image: ghcr.io/emobase/emobase-genomics:latest
    container_name: emobasegenomicsdbmigrate
    restart: no
    command: ["db:migrate", "-c", "/app/config.yaml"]
    environment:
      - EMOBASE_GENOMICS_ENV_PREFIX=emobase_genomics
      - EMOBASE_GENOMICS_MAIN_SPECIES=${MAIN_SPECIES}
      - EMOBASE_GENOMICS_MYSQL__HOST=mysql
      - EMOBASE_GENOMICS_MYSQL__USER=root
      - EMOBASE_GENOMICS_MYSQL__PASSWORD=${MYSQL_ROOT_PASSWORD}
    depends_on:
      mysql:
        condition: service_healthy
    profiles:
      - update

  emobasegenomicsesmigrate:
    image: ghcr.io/emobase/emobase-genomics:latest
    container_name: emobasegenomicsesmigrate
    restart: no
    command: ["es:migrate", "-c", "/app/config.yaml"]
    environment:
      - EMOBASE_GENOMICS_ENV_PREFIX=emobase_genomics
      - EMOBASE_GENOMICS_MAIN_SPECIES=${MAIN_SPECIES}
      - EMOBASE_GENOMICS_ELASTICSEARCH__ADDRESSES=http://es:9200
      - EMOBASE_GENOMICS_ELASTICSEARCH__INDEX_PREFIX=emobasegenomics
    depends_on:
      es:
        condition: service_healthy
    profiles:
      - update
