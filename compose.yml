version: "3"

volumes:
  es-data:
    driver: local
  blast-data:
    driver: local
  mysql-data:
    driver: local

services:

  nginx:
    image: nginx:1.19
    restart: always
    ports:
      - ${HTTP_PORT:-80}:80
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ${PUBLIC_DATA_DIR}:/download/:ro

  fe:
    image: docker.gitlab.gwdg.de/ibb/ibb-fe:1.5.1
    restart: always
    environment:
      - NUXT_PUBLIC_APIS_BASE_URL=${PUBLIC_SERVER}/ibb/api

  jbrowse2:
    image: docker.gitlab.gwdg.de/ibb/api/ibb-jbrowse2:1.5.0
    restart: always

  ontoscope:
    image: docker.gitlab.gwdg.de/ibb/api/ibb-ontoscope:latest
    restart: always

  swagger-ui:
    image: swaggerapi/swagger-ui
    restart: always
    environment:
      - BASE_URL=/ibb/swagger-ui
      - "URLS=[
        { url: '$PUBLIC_SERVER/ibb/api/geneservice/v1/q/openapi/', name: 'Gene Service' },
        { url: '$PUBLIC_SERVER/ibb/api/ontologyservice/v1/q/openapi/', name: 'Ontology Service' }
        ]" 

  es:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.1
    restart: always
    volumes:
      - es-data:/usr/share/elasticsearch/data
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    mem_limit: 1g
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - 9200:9200 # should be disabled in production
    healthcheck:
      test: 
        [
          "CMD-SHELL",
          "curl -s localhost:9200 | grep -q 'You Know, for Search'"
        ]
      interval: 10s
      timeout: 10s
      retries: 120

  geneservice:
    image: docker.gitlab.gwdg.de/ibb/api/geneservice:1.3.1
    restart: always
    depends_on:
      es:
        condition: service_healthy
    volumes:
      - ${PRIVATE_DATA_DIR}/geneservice:/data:ro
    environment:
      - MP_OPENAPI_SERVERS=$PUBLIC_SERVER/ibb/api/geneservice/v1/

  ontologyservice:
    image: docker.gitlab.gwdg.de/ibb/api/ontologyservice:1.5.0
    restart: always
    depends_on:
      es:
        condition: service_healthy
    environment:
      - MP_OPENAPI_SERVERS=$PUBLIC_SERVER/ibb/api/ontologyservice/v1/

  imageservice:
    image: docker.gitlab.gwdg.de/ibb/api/imageservice:1.5.0
    restart: always
    user: "${UID}:${GID}"
    depends_on:
      es:
        condition: service_healthy
    volumes:
      - ${IMAGE_DIR}:/images
      - ${PRIVATE_DATA_DIR}/imageservice:/data:ro
         
  phenotypeservice:
    image: docker.gitlab.gwdg.de/ibb/api/phenotypeservice:1.5.0
    restart: always
    depends_on:
      es:
        condition: service_healthy
      imageservice:
        condition: service_started
    volumes:
      - ${IMAGE_DIR}:/images
      - ${PRIVATE_DATA_DIR}/phenotypeservice:/data:ro

  goannotationservice:
    image: docker.gitlab.gwdg.de/ibb/api/geneontologyservice:1.3.0
    restart: always
    depends_on:
      es:
        condition: service_healthy

  publicationservice:
    image: docker.gitlab.gwdg.de/ibb/api/ibb-publication:1.3.0
    restart: always
    depends_on:
      es:
        condition: service_healthy

  querypipelineservice:
    image: docker.gitlab.gwdg.de/ibb/api/query-pipeline:1.5.0
    restart: always
    environment:
      - PUBLIC_SERVER=$PUBLIC_SERVER/ibb/api/querypipelineservice/v1/

  mysql:
    image: mysql:8.0
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD
      - MYSQL_DATABASE=keycloak
      - MYSQL_USER
      - MYSQL_PASSWORD
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysql -u $$MYSQL_USER -p$$MYSQL_PASSWORD -e 'select 1'"
        ]
      interval: 10s
      timeout: 10s
      retries: 120

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.3
    restart: always
    command: ["start"]
    environment:
      - KEYCLOAK_ADMIN
      - KEYCLOAK_ADMIN_PASSWORD
      - KC_HOSTNAME_DEBUG=true
      - KC_HOSTNAME_URL=${PUBLIC_SERVER}/ibb/keycloak/
      - KC_HOSTNAME_ADMIN_URL=${PUBLIC_SERVER}/ibb/keycloak/
      - KC_HOSTNAME_STRICT=false
      - KC_HOSTNAME_STRICT_HTTPS=false
      - KC_HTTP_RELATIVE_PATH=/ibb/keycloak/
      - KC_HTTP_ENABLED=true
      - KC_PROXY_HEADERS=xforwarded
      - KC_DB=mysql
      - KC_DB_URL_HOST=mysql
      - KC_DB_USERNAME=$MYSQL_USER
      - KC_DB_PASSWORD=$MYSQL_PASSWORD
      - KC_DB_SCHEMA=keycloak
    depends_on:
      mysql:
        condition: service_healthy

  blast:
    image: wurmlab/sequenceserver:latest # The current version is 3.0.1 but they have not provided the docker image with tag 3.0.1
    tty: true
    mem_limit: 1g
    restart: always
    command: ["sh", "-c", "sed -i 's|redirect to(\"/#{job.id}\")|redirect to(\"'$${PUBLIC_SERVER}'/ibb/blast/#{job.id}\")|g' /sequenceserver/lib/sequenceserver/routes.rb; sequenceserver"]
    environment:
      - PUBLIC_SERVER
    volumes:
      - blast-data:/db/
    ports:
      - 4567:4567

  setup-blast:
    image: wurmlab/sequenceserver:latest
    command: ["/bin/sh", "/work/create-db.sh"]
    volumes:
      - ${PUBLIC_DATA_DIR}/blast/:/data/
      - ./blast/:/work/
      - blast-data:/db/

    profiles:
      - setup
