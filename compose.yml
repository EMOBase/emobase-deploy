version: "3"

volumes:
  es-data:
    driver: local

services:

  nginx:
    image: nginx:1.19
    restart: always
    ports:
      - ${HTTP_PORT:-80}:80
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

  fe:
    image: docker.gitlab.gwdg.de/ibb/ibb-fe:1.3.1
    restart: always
    environment:
      - NUXT_PUBLIC_APIS_BASE_URL=${PUBLIC_SERVER}/ibb/api
      - NUXT_PUBLIC_APIS_URLS_IBPHENOTYPESERVICE=https://ibeetle-base.uni-goettingen.de/ibb/api/screen/v1/
      - NUXT_PUBLIC_APIS_URLS_IBIMAGESERVICE=https://ibeetle-base.uni-goettingen.de/ibb/api/image/v1/
      - NUXT_PUBLIC_APIS_URLS_IBLETHALITYSERVICE=https://ibeetle-base.uni-goettingen.de/ibb/api/lethality/v1/
      - NUXT_PUBLIC_APIS_URLS_QUERYPIPELINESERVICE=https://ibeetle-base.uni-goettingen.de/ibb/api/pipeline/v1/


  swagger-ui:
    image: swaggerapi/swagger-ui
    restart: always
    environment:
      - BASE_URL=/ibb/swagger-ui
      - "URLS=[
        { url: '$PUBLIC_SERVER/ibb/api/geneservice/v1/q/openapi/', name: 'Gene Service' }
        { url: '$PUBLIC_SERVER/ibb/api/phenotypeservice/v1/q/openapi/', name: 'Phenotype Service' },
        { url: '$PUBLIC_SERVER/ibb/api/imageservice/v1/q/openapi/', name: 'Image Service' },
        { url: '$PUBLIC_SERVER/ibb/api/ontologyservice/v1/q/openapi/', name: 'Ontology Service' },
        { url: '$PUBLIC_SERVER/ibb/api/goannotationservice/v1/q/openapi/', name: 'GO Annotation Service' },
        { url: '$PUBLIC_SERVER/ibb/api/publicationservice/v1/q/openapi/', name: 'Publication Service' }
        ]" 

  es:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.1
    restart: always
    volumes:
      - es-data:/usr/share/elasticsearch/data
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    mem_limit: 0.5g
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - 9200:9200 # should be disabled in production
    healthcheck:
      test: 
        [
          "CMD-SHELL",
          "curl -s localhost:9200 | grep -q 'You Know, for Search'"
        ]
      interval: 10s
      timeout: 10s
      retries: 120

  geneservice:
    image: docker.gitlab.gwdg.de/ibb/api/geneservice:1.3.1
    restart: always
    depends_on:
      es:
        condition: service_healthy
    ports:
      - 8092:8080 # should be disabled in production
    volumes:
      - ${GENESERVICE_DATA_DIR}:/data:ro

  ontologyservice:
    image: docker.gitlab.gwdg.de/ibb/api/ontologyservice:1.3.0
    restart: always
    depends_on:
      es:
        condition: service_healthy
    ports:
      - 8082:8080 # should be disabled in production

  imageservice:
    image: docker.gitlab.gwdg.de/ibb/api/imageservice:1.3.0
    restart: always
    user: 1001:1001
    depends_on:
      es:
        condition: service_healthy
    volumes:
      - ${IMAGE_DIR}:/images
    ports:
      - 8084:8080 # should be disabled in production
         
  phenotypeservice:
    image: docker.gitlab.gwdg.de/ibb/api/phenotypeservice:1.3.0
    restart: always
    depends_on:
      es:
        condition: service_healthy
      imageservice:
        condition: service_started
    ports:
      - 8086:8080 # should be disabled in production

  goannotationservice:
    image: docker.gitlab.gwdg.de/ibb/api/geneontologyservice:1.3.0
    restart: always
    depends_on:
      es:
        condition: service_healthy
    ports:
      - 8088:8080 # should be disabled in production

  publicationservice:
    image: docker.gitlab.gwdg.de/ibb/api/ibb-publication:1.3.0
    restart: always
    depends_on:
      es:
        condition: service_healthy
    ports:
      - 8090:8080 # should be disabled in production

  keycloak:
    image: quay.io/keycloak/keycloak:21.1.1
    command: "start-dev"
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
    profiles:
      - experimental
